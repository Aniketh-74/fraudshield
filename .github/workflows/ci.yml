name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: Lint Python services
        run: |
          ruff check simulator/ feature-enrichment/ ml-scorer/ \
            decision-engine/ shap-explainer/ api-gateway/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: cd dashboard && npm ci

      - name: Lint dashboard (ESLint)
        run: cd dashboard && npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: |
          pip install pytest pytest-asyncio httpx
          pip install redis psycopg2-binary structlog lightgbm scikit-learn joblib \
                      prometheus-client fastapi pydantic

      - name: Run unit tests
        run: python -m pytest tests/unit/ -x -q --tb=short
