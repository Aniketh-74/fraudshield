<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Detection Dashboard</title>
    <style>
        body {
            background-color: #0F172A;
            color: #E2E8F0;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #1E293B;
            border-radius: 8px;
            padding: 32px 48px;
            text-align: center;
            max-width: 480px;
        }
        h1 { color: #F1F5F9; margin-bottom: 8px; }
        p  { color: #94A3B8; }
        .badge {
            display: inline-block;
            background-color: #F59E0B;
            color: #0F172A;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Fraud Detection Pipeline</h1>
        <p>Real-time dashboard coming in Phase 5.</p>
        <p>Infrastructure is running. ML Scorer available at <a href="http://localhost:8000/health" style="color:#38BDF8">:8000/health</a>.</p>
        <div class="badge">Phase 3 -- Infrastructure Ready</div>
    </div>
</body>
</html>
