---
# grafana-datasource.yaml
# Grafana datasource provisioning ConfigMap.
# Mounted at /etc/grafana/provisioning/datasources/ in the Grafana container.
# Configures Prometheus as the default datasource pointing to prometheus-service:9090.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: fraud-detection
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-service:9090
        access: proxy
        isDefault: true
        editable: false
        jsonData:
          timeInterval: "15s"
