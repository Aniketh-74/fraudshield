---
# prometheus-rbac.yaml
# Grants Prometheus permission to discover pods via kubernetes_sd_configs.
# Without this ClusterRole + ClusterRoleBinding, Prometheus cannot list pods and
# all targets will appear as "down" in the Targets page.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: fraud-detection
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - services
      - endpoints
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: fraud-detection
