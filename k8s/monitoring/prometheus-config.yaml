---
# prometheus-config.yaml
# Prometheus scrape configuration using kubernetes_sd_configs with role: pod.
# Only pods annotated with prometheus.io/scrape: "true" are scraped.
# Label relabeling maps pod annotation port and path to scrape targets.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: fraud-detection
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.yaml

    scrape_configs:
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [fraud-detection]
        relabel_configs:
          # Only scrape pods that have prometheus.io/scrape: "true" annotation
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          # Replace default port with the value of prometheus.io/port annotation
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          # Replace default /metrics path with prometheus.io/path annotation if set
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # Carry the pod's app label as the service label in Prometheus
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: service
          # Add namespace label from pod metadata
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          # Add pod name label
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
