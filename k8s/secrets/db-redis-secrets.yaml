# In production, use external secret management (Vault, AWS Secrets Manager)
apiVersion: v1
kind: Secret
metadata:
  name: fraud-detection-secrets
  namespace: fraud-detection
type: Opaque
data:
  # echo -n "fraudpassword" | base64
  POSTGRES_PASSWORD: ZnJhdWRwYXNzd29yZA==
  # echo -n "frauduser" | base64
  POSTGRES_USER: ZnJhdWR1c2Vy
  # echo -n "frauddb" | base64
  POSTGRES_DB: ZnJhdWRkYg==
  # Redis runs without password (matches docker-compose.yml)
  # echo -n "" | base64
  REDIS_PASSWORD: ""
