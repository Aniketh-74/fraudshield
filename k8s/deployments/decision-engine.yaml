apiVersion: apps/v1
kind: Deployment
metadata:
  name: decision-engine
  namespace: fraud-detection
  labels:
    app: decision-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: decision-engine
  template:
    metadata:
      labels:
        app: decision-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: decision-engine
        image: fraud-detection/decision-engine:latest
        imagePullPolicy: Never
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: fraud-detection-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fraud-detection-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: fraud-detection-secrets
              key: POSTGRES_DB
        # DATABASE_URL uses frauduser/fraudpassword (K8s secret values)
        # Note: K8s secrets store frauduser/fraudpassword, not postgres/postgres (docker-compose values)
        - name: DATABASE_URL
          value: "postgresql://frauduser:fraudpassword@postgres-service:5432/frauddb"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-service.fraud-detection.svc.cluster.local:9092"
        - name: SCORER_URL
          value: "http://ml-scorer-service:8000"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: rules-config
          mountPath: /app/config/rules.yaml
          subPath: rules.yaml
      volumes:
      - name: rules-config
        configMap:
          name: rules-config
